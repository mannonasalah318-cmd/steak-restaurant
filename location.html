<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steak & Co. | Our Location</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0b0c10; color: #f5f5f5; padding-bottom: 60px; }
        h1, .logo { font-family: 'Playfair Display', serif; }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            background-color: #0b0c10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo { font-size: 28px; font-weight: 700; color: #c5a880; text-decoration: none; }
        .btn-home { border: 2px solid #c5a880; color: #c5a880; padding: 8px 20px; text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .btn-home:hover { background-color: #c5a880; color: #0b0c10; }

        /* Container */
        .location-container { max-width: 900px; margin: 50px auto 0 auto; padding: 0 20px; text-align: center; }
        .location-container h1 { font-size: 42px; color: #c5a880; margin-bottom: 15px; font-style: italic; }
        .location-container p { color: #aaa; margin-bottom: 35px; font-size: 16px; }
        
        .map-box { background-color: #111217; padding: 15px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .map-box iframe { width: 100%; height: 450px; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo">STEAK & CO.</a>
        <a href="index.html" class="btn-home">← Back To Home</a>
    </header>

    <main class="location-container">
        <h1><i class="fas fa-map-marker-alt"></i> Our Location</h1>
        <p>Visit us today and enjoy the finest steak dining experience in town.</p>
        <div class="map-box">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3451.171788753232!2d31.6022838!3d30.146522!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1m3!1d1!2d31.6022838!3d30.146522!5e0!3m2!1sen!2seg!4v1700000000000" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </main>

</body>
</html>
