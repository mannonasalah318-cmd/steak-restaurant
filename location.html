<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steak & Co. | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        h2, h4, .logo { font-family: 'Playfair Display', serif; }
        body { background-color: #0b0c10; color: #f5f5f5; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; background-color: #0b0c10; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .logo { font-size: 28px; color: #c5a880; }
        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin: 0 20px; }
        .nav-links a { font-size: 15px; color: #cdcdcd; text-decoration: none; }
        .nav-links a:hover, .nav-links .active { color: #c5a880; }

        .contact-container { padding: 80px 8%; text-align: center; max-width: 900px; margin: 0 auto; }
        .contact-container h2 { font-size: 42px; color: #c5a880; margin-bottom: 40px; }
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .contact-box { background-color: #111217; padding: 40px 20px; border-top: 3px solid #c5a880; }
        .contact-box h4 { color: #c5a880; margin-bottom: 10px; }
        .contact-box a { color: #fff; text-decoration: none; font-weight: bold; }
        .back-btn { display: inline-block; margin-top: 40px; background-color: #c5a880; color: #0b0c10; padding: 10px 30px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">STEAK & CO.</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">Our Story</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="contact-container">
        <h2>Visit & Contact Us</h2>
        <div class="contact-grid">
            <div class="contact-box">
                <h4>Our Location</h4>
                <p><a href="https://maps.google.com" target="_blank">📍 Open Location on Google Maps</a></p>
            </div>

</body>
</html>
