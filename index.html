<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steak & Co. | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        h1, .logo { font-family: 'Playfair Display', serif; }
        body { background-color: #0b0c10; color: #f5f5f5; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; background-color: #0b0c10; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .logo { font-size: 28px; font-weight: 700; color: #c5a880; }
        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin: 0 20px; }
        .nav-links a { font-size: 15px; color: #cdcdcd; transition: 0.3s; }
        .nav-links a:hover, .nav-links .active { color: #c5a880; }
        
        /* Hero Section */
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=1400') no-repeat center center/cover;
            height: 80vh; display: flex; justify-content: center; align-items: center; text-align: center; padding: 0 20px;
        }
        .hero-content h1 { font-size: 64px; color: #fff; margin-bottom: 20px; font-style: italic; }
        .hero-content p { font-size: 18px; color: #cdcdcd; margin-bottom: 35px; max-width: 650px; margin:0 auto; }
        .btn-primary { background-color: #c5a880; color: #0b0c10; padding: 15px 40px; font-size: 15px; font-weight: 700; text-transform: uppercase; border: none; cursor: pointer; text-decoration: none; transition: 0.3s; }
        .btn-primary:hover { background-color: #fff; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">STEAK & CO.</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">Our Story</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h1>The Art of Luxury Dining</h1>
            <p>Crafting unforgettable culinary experiences with premium cuts and master chefs.</p>
            <a href="menu.html" class="btn-primary">Open Menu</a>
        </div>
    </section>

</body>
</html>
