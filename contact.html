<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steak & Co. | Connect With Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0b0c10; color: #f5f5f5; padding-bottom: 60px; }
        h1, .logo { font-family: 'Playfair Display', serif; }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            background-color: #0b0c10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo { font-size: 28px; font-weight: 700; color: #c5a880; text-decoration: none; }
        .btn-home { border: 2px solid #c5a880; color: #c5a880; padding: 8px 20px; text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .btn-home:hover { background-color: #c5a880; color: #0b0c10; }

        /* Container */
        .social-container { max-width: 600px; margin: 60px auto 0 auto; padding: 0 20px; text-align: center; }
        .social-container h1 { font-size: 42px; color: #c5a880; margin-bottom: 15px; font-style: italic; }
        .social-container p { color: #aaa; margin-bottom: 35px; font-size: 16px; }

        .social-buttons-list { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        .social-btn { display: flex; align-items: center; padding: 15px 25px; font-size: 16px; font-weight: 600; color: #fff; text-decoration: none; border-radius: 6px; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .social-btn i { font-size: 22px; margin-right: 15px; width: 25px; text-align: center; }

        /* ألوان المنصات وتأثير الحركة */
        .btn-facebook { background-color: #1877f2; }
        .btn-facebook:hover { background-color: #145dbf; transform: scale(1.03); }

        .btn-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-instagram:hover { transform: scale(1.03); box-shadow: 0 6px 15px rgba(220, 39, 67, 0.4); }

        .btn-tiktok { background-color: #000000; border: 1px solid rgba(255,255,255,0.2); }
        .btn-tiktok:hover { background-color: #111; transform: scale(1.03); }

        .btn-whatsapp { background-color: #25d366; }
        .btn-whatsapp:hover { background-color: #1ebea5; transform: scale(1.03); }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo">STEAK & CO.</a>
        <a href="index.html" class="btn-home">← Back To Home</a>
    </header>

    <main class="social-container">
        <h1>Connect With Us</h1>
        <p>Follow our social channels or talk directly with our team on WhatsApp.</p>
        
        <div class="social-buttons-list">
            <a href="#" target="_blank" class="social-btn btn-facebook">
                <i class="fab fa-facebook-f"></i> Facebook Page
            </a>
            
            <a href="#" target="_blank" class="social-btn btn-instagram">
                <i class="fab fa-instagram"></i> Instagram Profile
            </a>
            
            <a href="#" target="_blank" class="social-btn btn-tiktok">
                <i class="fab fa-tiktok"></i> TikTok Videos
            </a>
            
            <a href="https://wa.me/201234567890" target="_blank" class="social-btn btn-whatsapp">
                <i class="fab fa-whatsapp"></i> WhatsApp Chat
            </a>
        </div>
    </main>

</body>
</html>
